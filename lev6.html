<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Hotel Feedback</title>
  </head>
  <body>
    <h1>Hotel Feedback Form</h1>

    <form method="get">
      <!-- <input type="radio" name="" value=""> -->
      <h3>Are you from inside the India? or outside </h3>

      <label for="inIndia">inside:</label>
      <input id="inIndia"type="radio" name="loc" value="inside">

      <label for="outside">Outside</label>
      <input id="outside"type="radio" name="loc" value="outside">

      <h2>How was your servise?</h2>

      <select name="stars">
         <option value="Great">3</option>
         <option value="Okey">2</option>
         <option value="Bad">1</option>


      </select>
      <h2>Any other feedback?</h2>

     <textarea name="mytext" rows="2" cols="80"></textarea>

      <input type="submit" name="" value="SUBMIT">




    </form>
  </body>
</html>
