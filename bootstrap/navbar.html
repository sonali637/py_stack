<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap Navigation Bar</title>
  <!-- This link brings in the Bootstrap CSS styles -->
  <link href="https://jsdelivr.net" rel="stylesheet">
</head>
<body>
  <!-- Main container with a dark background color and padding -->
<nav style="background-color: #222; padding: 15px 30px; display: flex; align-items: center; justify-content: space-between;">

<!-- Website Logo / Title -->
<a href="#" style="color: #ffffff; text-decoration: none; font-family: Arial, sans-serif; font-size: 24px; font-weight: bold;">Navbar</a>

<!-- Navigation Links arranged horizontally with spacing -->
<div style="display: flex; gap: 25px;">
  <a href="#home" style="color: #ffffff; text-decoration: none; font-family: Arial, sans-serif; font-size: 16px;">Home</a>
  <a href="#news" style="color: #cccccc; text-decoration: none; font-family: Arial, sans-serif; font-size: 16px;">News</a>
  <a href="#contact" style="color: #cccccc; text-decoration: none; font-family: Arial, sans-serif; font-size: 16px;">Contact</a>
  <a href="#about" style="color: #cccccc; text-decoration: none; font-family: Arial, sans-serif; font-size: 16px;">About</a>
</div>

</nav>

</body>
</html>
